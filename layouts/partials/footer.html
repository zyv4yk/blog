      <span>{{ .Site.Params.author | lower }}</span>
      <span>{{ .Site.Params.location | lower }}</span>
      <span class="foot__sig">end of line_</span>
    </div>
    <div class="foot__col">
      <span style="color: var(--ink-4)">signal</span>
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noreferrer">github →</a>

    </div>
    <div class="foot__col">
      <span style="color: var(--ink-4)">build</span>
      <span>blcknb.tech · v{{ now.Format "2006.01" }}</span>
